server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/auth/**
          filters:
            - name: CircuitBreaker
              args:
                name: auth-service-cb
                fallbackUri: forward:/fallback/auth
        - id: product-service
          uri: lb://PRODUCT-SERVICE
          predicates:
            - Path=/products/**
          filters:
            - name: CircuitBreaker
              args:
                name: product-service-cb
                fallbackUri: forward:/fallback/products
        - id: cart-service
          uri: lb://CART-SERVICE
          predicates:
            - Path=/cart/**
          filters:
            - name: CircuitBreaker
              args:
                name: cart-service-cb
                fallbackUri: forward:/fallback/cart
        - id: order-service
          uri: lb://ORDER-SERVICE
          predicates:
            - Path=/orders/**
          filters:
            - name: CircuitBreaker
              args:
                name: order-service-cb
                fallbackUri: forward:/fallback/orders
        - id: wallet-service
          uri: lb://WALLET-SERVICE
          predicates:
            - Path=/wallet/**
          filters:
            - name: CircuitBreaker
              args:
                name: wallet-service-cb
                fallbackUri: forward:/fallback/wallet
        - id: inventory-service
          uri: lb://INVENTORY-SERVICE
          predicates:
            - Path=/inventory/**
          filters:
            - name: CircuitBreaker
              args:
                name: inventory-service-cb
                fallbackUri: forward:/fallback/inventory
        - id: delivery-service
          uri: lb://DELIVERY-SERVICE
          predicates:
            - Path=/delivery/**
          filters:
            - name: CircuitBreaker
              args:
                name: delivery-service-cb
                fallbackUri: forward:/fallback/delivery
        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/notifications/**
          filters:
            - name: CircuitBreaker
              args:
                name: notification-service-cb
                fallbackUri: forward:/fallback/notifications

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

jwt:
  secret: ${JWT_SECRET}

resilience4j:
  circuitbreaker:
    instances:
      auth-service-cb:
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
      product-service-cb:
        failureRateThreshold: 60
        waitDurationInOpenState: 20s
        slidingWindowSize: 8
        minimumNumberOfCalls: 4
      cart-service-cb:
        failureRateThreshold: 50
        waitDurationInOpenState: 25s
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
      order-service-cb:
        failureRateThreshold: 40
        waitDurationInOpenState: 45s
        slidingWindowSize: 12
        minimumNumberOfCalls: 6
      wallet-service-cb:
        failureRateThreshold: 30
        waitDurationInOpenState: 60s
        slidingWindowSize: 15
        minimumNumberOfCalls: 8
      inventory-service-cb:
        failureRateThreshold: 70
        waitDurationInOpenState: 15s
        slidingWindowSize: 6
        minimumNumberOfCalls: 3
      delivery-service-cb:
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
      notification-service-cb:
        failureRateThreshold: 80
        waitDurationInOpenState: 10s
        slidingWindowSize: 5
        minimumNumberOfCalls: 2

management:
  endpoints:
    web:
      exposure:
        include: health,gateway,circuitbreakers,circuitbreakerevents
  endpoint:
    health:
      show-details: always
    gateway:
      enabled: true
