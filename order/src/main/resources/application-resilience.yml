resilience4j:
  circuitbreaker:
    instances:
      orderService:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        minimum-number-of-calls: 5
        permitted-number-of-calls-in-half-open-state: 3
      cartService:
        failure-rate-threshold: 60
        wait-duration-in-open-state: 20s
        sliding-window-size: 8
        minimum-number-of-calls: 4
      inventoryService:
        failure-rate-threshold: 70
        wait-duration-in-open-state: 15s
        sliding-window-size: 6
        minimum-number-of-calls: 3
      walletService:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        minimum-number-of-calls: 5
      userService:
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        sliding-window-size: 10
        minimum-number-of-calls: 5

  retry:
    instances:
      orderService:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
      cartService:
        max-attempts: 2
        wait-duration: 1s
      inventoryService:
        max-attempts: 3
        wait-duration: 500ms
      walletService:
        max-attempts: 2
        wait-duration: 1s
      userService:
        max-attempts: 3
        wait-duration: 1s

  timelimiter:
    instances:
      orderService:
        timeout-duration: 10s
      cartService:
        timeout-duration: 5s
      inventoryService:
        timeout-duration: 3s
      walletService:
        timeout-duration: 8s
      userService:
        timeout-duration: 4s

management:
  endpoints:
    web:
      exposure:
        include: health,circuitbreakers,circuitbreakerevents,retries,retryevents
  endpoint:
    health:
      show-details: always
    circuitbreakers:
      enabled: true
  health:
    circuitbreakers:
      enabled: true